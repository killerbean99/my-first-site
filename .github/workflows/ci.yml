name: CI Workflow

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show files list
        run: ls -la

      - name: Show current date
        run: date

      - name: Show current user
        run: whoami

      - name: Print message
        run: echo "CI is working!"
